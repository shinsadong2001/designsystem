<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>11ST 홈 프로토타입</title>
  <link rel="stylesheet" href="tokens/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #c8ccd4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 0 80px;
      font-family: var(--font-family-pretendard, 'Pretendard', sans-serif);
    }

    /* ── 상단 라벨 ─────────────────────── */
    .proto-label {
      margin-bottom: 20px;
      text-align: center;
    }
    .proto-label h1 {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .proto-label p {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    /* ── 디바이스 프레임 ───────────────── */
    .device {
      width: 375px;
      height: 812px;
      position: relative;
      border-radius: 50px;
      background: white;
      box-shadow:
        0 0 0 2px #888,
        0 0 0 10px #1a1a1a,
        0 0 0 12px #333,
        0 30px 80px rgba(0,0,0,0.45),
        0 8px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* ── 내부 스크롤 컨테이너 ─────────── */
    .device-scroll {
      width: 375px;
      height: 812px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: relative;
    }
    .device-scroll::-webkit-scrollbar { display: none; }

    /* ── 스티키 헤더 ──────────────────── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: white;
    }

    /* ── 고정 탭바 ────────────────────── */
    .tabbar-fixed {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 375px;
      z-index: 100;
      overflow: clip;
    }

    /* ── 스크롤 내 탭 (가로) ──────────── */
    .htabs { scrollbar-width: none; }
    .htabs::-webkit-scrollbar { display: none; }
    .hrow { scrollbar-width: none; }
    .hrow::-webkit-scrollbar { display: none; }
  </style>
</head>
